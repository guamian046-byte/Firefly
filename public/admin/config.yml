# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: guamian046-byte/Firefly
  branch: master
  auth_methods: [token]
  commit_messages:
    create: 'content: publish "{{slug}}"'
    update: 'content: update "{{slug}}"'
    delete: 'content: delete "{{slug}}"'
    uploadMedia: 'content: upload "{{path}}"'
    deleteMedia: 'content: delete "{{path}}"'

media_folder: public/assets/posts
public_folder: /assets/posts

collections:
  - name: posts
    label: 博客文章
    label_singular: 文章
    folder: src/content/posts
    create: true
    delete: true
    extension: md
    format: frontmatter
    identifier_field: slug
    summary: '{{title}} · {{published}}'
    slug: '{{fields.slug}}'
    sortable_fields:
      fields: [published, title, category, draft, pinned]
      default:
        field: published
        direction: descending
    fields:
      - label: 设为私密
        name: draft
        widget: boolean
        default: false
        hint: 关闭表示公开，所有访客都能查看；开启表示私密，不会发布到网站，只能在此后台查看和编辑。
      - label: 文章标题
        name: title
        widget: string
      - label: URL 路径
        name: slug
        widget: string
        hint: 只填写小写英文、数字和连字符，例如 my-first-post；发布后不建议修改。
        pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', 只能使用小写英文、数字和连字符]
      - label: 发布时间
        name: published
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
      - label: 更新时间
        name: updated
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
        required: false
      - label: 摘要
        name: description
        widget: text
        required: false
      - label: 封面图片
        name: image
        widget: image
        required: false
        choose_url: true
      - label: 标签
        name: tags
        widget: list
        required: false
        default: []
        allow_add: true
        field:
          label: 标签
          name: tag
          widget: string
      - label: 分类
        name: category
        widget: string
        required: false
      - label: 作者
        name: author
        widget: string
        required: false
      - label: 语言
        name: lang
        widget: select
        required: false
        options:
          - { label: 简体中文, value: zh_CN }
          - { label: 繁体中文, value: zh_TW }
          - { label: English, value: en }
          - { label: 日本語, value: ja }
          - { label: 한국어, value: ko }
          - { label: Русский, value: ru }
      - label: 置顶
        name: pinned
        widget: boolean
        default: false
      - label: 开启评论
        name: comment
        widget: boolean
        default: true
      - label: 来源链接
        name: sourceLink
        widget: string
        required: false
      - name: licenseName
        widget: hidden
        default: ""
      - name: licenseUrl
        widget: hidden
        default: ""
      - name: password
        widget: hidden
        default: ""
      - name: passwordHint
        widget: hidden
        default: ""
      - label: 正文
        name: body
        widget: markdown
