<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex, nofollow" />
		<title>批量管理文章可见性</title>
		<style>
			:root { color-scheme: light dark; font-family: system-ui, sans-serif; }
			body { margin: 0; background: #f5f6f8; color: #20242b; }
			main { width: min(960px, calc(100% - 2rem)); margin: 2rem auto; }
			.card { background: #fff; border: 1px solid #e1e5ea; border-radius: 1rem; padding: 1.25rem; box-shadow: 0 0.4rem 1.5rem rgb(0 0 0 / 6%); }
			h1 { margin: 0 0 0.4rem; font-size: 1.6rem; }
			p { color: #606975; }
			.auth, .toolbar { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; }
			input[type="password"] { flex: 1 1 320px; min-width: 0; padding: 0.75rem; border: 1px solid #cbd2da; border-radius: 0.6rem; background: transparent; color: inherit; }
			button, .back { border: 0; border-radius: 0.6rem; padding: 0.75rem 1rem; font-weight: 650; cursor: pointer; text-decoration: none; }
			button:disabled { opacity: 0.45; cursor: not-allowed; }
			.primary { background: #1769aa; color: #fff; }
			.private { background: #7b3fc6; color: #fff; }
			.public { background: #138a58; color: #fff; }
			.back { background: #e9edf2; color: #26313d; }
			.toolbar { margin: 1rem 0; }
			#status { min-height: 1.5rem; margin: 0.8rem 0; font-weight: 600; }
			#status.error { color: #c62f3e; }
			#status.success { color: #087747; }
			#article-list { display: grid; gap: 0.55rem; }
			.article { display: flex; align-items: center; gap: 0.8rem; padding: 0.85rem; border: 1px solid #e0e5eb; border-radius: 0.7rem; cursor: pointer; }
			.article:hover { background: #f7f9fb; }
			.article input { width: 1.15rem; height: 1.15rem; }
			.title { flex: 1; min-width: 0; overflow-wrap: anywhere; }
			.badge { flex: none; border-radius: 999px; padding: 0.25rem 0.65rem; font-size: 0.78rem; font-weight: 700; }
			.badge.private { background: #eee3fb; color: #6c2eb8; }
			.badge.public { background: #dcf5e9; color: #087747; }
			.note { font-size: 0.88rem; }
			[hidden] { display: none !important; }
			@media (prefers-color-scheme: dark) {
				body { background: #15181d; color: #edf0f4; }
				.card { background: #20242b; border-color: #343a44; }
				p { color: #b0b8c2; }
				.article { border-color: #3a414b; }
				.article:hover { background: #282d35; }
				.back { background: #343a44; color: #edf0f4; }
			}
		</style>
	</head>
	<body>
		<main>
			<section class="card">
				<h1>批量隐藏 / 恢复公开</h1>
				<p>输入 GitHub Access Token 加载文章。令牌仅在当前页面内存中使用，刷新页面后立即清除。</p>
				<div class="auth">
					<input id="token" type="password" autocomplete="off" placeholder="粘贴具有仓库 Contents 读写权限的 Access Token" />
					<button id="load" class="primary" type="button">加载文章</button>
					<a class="back" href="/admin/">返回文章后台</a>
				</div>
				<div id="status" role="status" aria-live="polite"></div>
				<div id="manager" hidden>
					<div class="toolbar">
						<button id="select-all" type="button">全选</button>
						<button id="clear" type="button">取消选择</button>
						<button id="hide" class="private" type="button">一键设为私密</button>
						<button id="publish" class="public" type="button">一键恢复公开</button>
						<strong id="selection">已选择 0 篇</strong>
					</div>
					<div id="article-list"></div>
				</div>
				<p class="note">提示：操作会把所有勾选文章合并为一次 GitHub 提交，然后自动触发网站部署。请等待约 1–3 分钟再查看网站。</p>
			</section>
		</main>
		<script src="/admin/bulk.js"></script>
	</body>
</html>
